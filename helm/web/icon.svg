<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10131c"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fe9d6"/>
      <stop offset="1" stop-color="#4db6a4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- фон с лёгким скруглением (маска под iOS всё равно обрежет) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- штурвал -->
  <g fill="none" stroke="url(#ring)" stroke-width="22"
     stroke-linecap="round" stroke-linejoin="round"
     transform="translate(256,256)">
    <!-- внешнее кольцо -->
    <circle r="150"/>
    <!-- внутренняя ступица -->
    <circle r="46"/>
    <!-- спицы (4 шт) -->
    <line x1="0" y1="-150" x2="0" y2="-46"/>
    <line x1="0" y1="46"  x2="0" y2="150"/>
    <line x1="-150" y1="0" x2="-46" y2="0"/>
    <line x1="46" y1="0"  x2="150" y2="0"/>
  </g>
  <!-- центральная точка -->
  <circle cx="256" cy="256" r="16" fill="url(#ring)"/>
</svg>
