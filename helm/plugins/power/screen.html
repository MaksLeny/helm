<style>
  /* Заскоуплено под #plugin-power, наследует тему Helm. */
  #plugin-power { padding-bottom: 24px; }
  #plugin-power .p-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  #plugin-power .p-tile {
    display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
    padding: 18px; min-height: 108px; text-align: left;
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    color: var(--txt); cursor: pointer; font-family: inherit;
    transition: transform .14s, background .2s, border-color .2s;
  }
  #plugin-power .p-tile:active { transform: scale(.96); background: var(--card-hi); }
  #plugin-power .p-tile .ic {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-soft); color: var(--accent);
  }
  #plugin-power .p-tile .ic svg { width: 22px; height: 22px; }
  #plugin-power .p-tile .lbl { font-size: 15px; font-weight: 600; }
  /* Опасные действия — красноватый акцент иконки */
  #plugin-power .p-tile.danger .ic { background: rgba(255,93,115,0.16); color: #ff5d73; }

  #plugin-power .p-hint {
    font-size: 13px; color: var(--dim); margin: 4px 2px 16px; line-height: 1.5;
  }

  /* Подтверждение необратимого действия */
  #plugin-power .p-confirm {
    position: fixed; inset: 0; z-index: 70; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  }
  #plugin-power .p-confirm.show { display: flex; }
  #plugin-power .p-dialog {
    width: 100%; max-width: 340px; background: var(--bg);
    border: 1px solid var(--line); border-radius: 20px; padding: 22px;
    text-align: center;
  }
  #plugin-power .p-dialog .d-ic {
    width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,93,115,0.16); color: #ff5d73;
  }
  #plugin-power .p-dialog .d-ic svg { width: 30px; height: 30px; }
  #plugin-power .p-dialog .d-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
  #plugin-power .p-dialog .d-text { font-size: 14px; color: var(--dim); margin-bottom: 20px; }
  #plugin-power .p-actions { display: flex; gap: 10px; }
  #plugin-power .p-btn {
    flex: 1; padding: 13px; font-size: 15px; font-weight: 600; font-family: inherit;
    border-radius: 13px; border: 1px solid var(--line); cursor: pointer;
    background: var(--card); color: var(--txt); transition: transform .12s;
  }
  #plugin-power .p-btn:active { transform: scale(.96); }
  #plugin-power .p-btn.confirm { background: #ff5d73; border-color: #ff5d73; color: #fff; }

  #plugin-power .p-toast {
    position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
    background: var(--card-hi); color: var(--txt); border: 1px solid var(--line);
    padding: 11px 18px; border-radius: 14px; font-size: 14px; z-index: 75;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
    max-width: 80%; text-align: center;
  }
  #plugin-power .p-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<div class="p-hint">
  Управление питанием ПК. Сон, блокировка и гибернация выполняются сразу;
  выключение, перезагрузка и выход спросят подтверждение.
</div>

<div class="p-grid">
  <button class="p-tile" data-cmd="sleep">
    <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg></span>
    <span class="lbl">Сон</span>
  </button>
  <button class="p-tile" data-cmd="lock">
    <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
    <span class="lbl">Блокировка</span>
  </button>
  <button class="p-tile" data-cmd="hibernate">
    <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l2.5 2.5M16.5 16.5L19 19M19 5l-2.5 2.5M7.5 16.5L5 19"/><circle cx="12" cy="12" r="3"/></svg></span>
    <span class="lbl">Гибернация</span>
  </button>
  <button class="p-tile" data-cmd="logoff" data-confirm="1" data-title="Выйти из системы?" data-text="Все несохранённые программы будут закрыты.">
    <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></span>
    <span class="lbl">Выход</span>
  </button>
  <button class="p-tile danger" data-cmd="restart" data-confirm="1" data-title="Перезагрузить ПК?" data-text="Компьютер перезагрузится немедленно.">
    <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.3M21 3v6h-6"/></svg></span>
    <span class="lbl">Перезагрузка</span>
  </button>
  <button class="p-tile danger" data-cmd="shutdown" data-confirm="1" data-title="Выключить ПК?" data-text="Компьютер выключится немедленно.">
    <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></svg></span>
    <span class="lbl">Выключение</span>
  </button>
</div>

<div class="p-confirm" id="pConfirm">
  <div class="p-dialog">
    <div class="d-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></div>
    <div class="d-title" id="pConfirmTitle">Подтвердить?</div>
    <div class="d-text" id="pConfirmText"></div>
    <div class="p-actions">
      <button class="p-btn" id="pCancel">Отмена</button>
      <button class="p-btn confirm" id="pConfirmBtn">Подтвердить</button>
    </div>
  </div>
</div>

<div class="p-toast" id="pToast"></div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const confirmBox = $('pConfirm');
  let pendingCmd = null;

  function send(cmd){
    if(window.HelmSend) window.HelmSend({ plugin: 'power', cmd: cmd });
  }
  function toast(text){
    const t = $('pToast'); if(!t) return;
    t.textContent = text; t.classList.add('show');
    clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove('show'), 2600);
  }

  document.querySelectorAll('#plugin-power .p-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const cmd = tile.dataset.cmd;
      if(tile.dataset.confirm === '1'){
        pendingCmd = cmd;
        $('pConfirmTitle').textContent = tile.dataset.title || 'Подтвердить?';
        $('pConfirmText').textContent = tile.dataset.text || '';
        confirmBox.classList.add('show');
      } else {
        send(cmd);
        toast(tile.querySelector('.lbl').textContent + ': команда отправлена');
      }
    });
  });

  $('pCancel').addEventListener('click', () => {
    confirmBox.classList.remove('show'); pendingCmd = null;
  });
  confirmBox.addEventListener('click', (e) => {
    if(e.target === confirmBox){ confirmBox.classList.remove('show'); pendingCmd = null; }
  });
  $('pConfirmBtn').addEventListener('click', () => {
    if(pendingCmd){ send(pendingCmd); toast('Команда отправлена'); }
    confirmBox.classList.remove('show'); pendingCmd = null;
  });

  // Регистрация в ядре Helm.
  window.HelmPlugins = window.HelmPlugins || {};
  window.HelmPlugins['power'] = {
    onMessage: (msg) => {
      if(msg.type === 'power_result' && !msg.ok){
        toast('Не удалось: ' + (msg.message || msg.cmd));
      }
    },
    onShow: () => {},
    onHide: () => {}
  };
})();
</script>
