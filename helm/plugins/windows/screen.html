<style>
  #plugin-windows { padding-bottom: 28px; }
  #plugin-windows .w-actions { display: flex; gap: 12px; margin-bottom: 22px; }
  #plugin-windows .w-big {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 20px 12px; border-radius: 16px; border: 1px solid var(--line);
    background: var(--card); color: var(--txt); font-family: inherit; font-size: 14px;
    cursor: pointer; transition: transform .12s, background .2s;
  }
  #plugin-windows .w-big:active { transform: scale(.95); background: var(--card-hi); }
  #plugin-windows .w-big svg { width: 26px; height: 26px; color: var(--accent); }

  #plugin-windows .w-section { font-size: 12px; color: var(--dim); margin: 0 2px 10px; font-weight: 600; }
  #plugin-windows .w-list { display: flex; flex-direction: column; gap: 8px; }
  #plugin-windows .w-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 14px;
    border-radius: 12px; background: var(--card); border: 1px solid var(--line);
    cursor: pointer; transition: background .15s, transform .12s;
  }
  #plugin-windows .w-item:active { transform: scale(.98); background: var(--card-hi); }
  #plugin-windows .w-ic {
    width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-soft); color: var(--accent);
  }
  #plugin-windows .w-ic svg { width: 17px; height: 17px; }
  #plugin-windows .w-title {
    flex: 1; min-width: 0; font-size: 14px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  #plugin-windows .w-empty { text-align: center; color: var(--dim); padding: 30px 16px; font-size: 14px; line-height: 1.5; }
  #plugin-windows .w-toast {
    position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
    background: var(--card-hi); color: var(--txt); border: 1px solid var(--line);
    padding: 11px 18px; border-radius: 14px; font-size: 14px; z-index: 75;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; max-width: 80%; text-align: center;
  }
  #plugin-windows .w-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<div class="w-actions">
  <button class="w-big" id="wMinAll">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h16M4 18h16M8 4l4 4 4-4"/></svg>
    Свернуть всё
  </button>
  <button class="w-big" id="wRestore">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10h16M4 6h16M8 20l4-4 4 4"/></svg>
    Восстановить
  </button>
</div>

<div class="w-section">Открытые окна</div>
<div class="w-list" id="wList"></div>
<div class="w-empty" id="wEmpty" style="display:none;"></div>

<div class="w-toast" id="wToast"></div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const APP_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg>';

  function toast(t){
    const el = $('wToast'); if(!el) return;
    el.textContent = t; el.classList.add('show');
    clearTimeout(el._tm); el._tm = setTimeout(() => el.classList.remove('show'), 2200);
  }
  function send(o){ if(window.HelmSend) window.HelmSend(Object.assign({plugin:'windows'}, o)); }

  $('wMinAll').addEventListener('click', () => { send({cmd:'minimize_all'}); toast('Сворачиваю всё…'); });
  $('wRestore').addEventListener('click', () => { send({cmd:'restore_all'}); toast('Восстанавливаю…'); });

  function renderWindows(wins, supported){
    const list = $('wList'); const empty = $('wEmpty');
    list.innerHTML = '';
    if(!supported){
      empty.style.display = 'block';
      empty.textContent = 'Список окон недоступен. Для него нужен модуль pywin32 на ПК (pip install pywin32). Кнопки «Свернуть всё» и «Восстановить» работают и без него.';
      return;
    }
    if(!wins || !wins.length){
      empty.style.display = 'block';
      empty.textContent = 'Нет открытых окон';
      return;
    }
    empty.style.display = 'none';
    wins.slice().sort((a,b)=>a.title.localeCompare(b.title)).forEach(w => {
      const item = document.createElement('div');
      item.className = 'w-item';
      const ic = document.createElement('span'); ic.className = 'w-ic'; ic.innerHTML = APP_ICON;
      const tt = document.createElement('span'); tt.className = 'w-title'; tt.textContent = w.title;
      item.appendChild(ic); item.appendChild(tt);
      item.addEventListener('click', () => { send({cmd:'activate', id: w.id}); toast('Переключаю…'); });
      list.appendChild(item);
    });
  }

  let refreshTimer = null;
  window.HelmPlugins = window.HelmPlugins || {};
  window.HelmPlugins['windows'] = {
    onMessage: (msg) => {
      if(msg.type === 'windows_list'){ renderWindows(msg.windows, msg.supported); }
      else if(msg.type === 'windows_result'){ if(!msg.ok) toast('Не удалось: ' + (msg.message||'')); }
    },
    onShow: () => {
      send({cmd:'sync'});
      refreshTimer = setInterval(() => send({cmd:'sync'}), 5000);
    },
    onHide: () => { if(refreshTimer){ clearInterval(refreshTimer); refreshTimer = null; } }
  };
})();
</script>
