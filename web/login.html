<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Helm — вход</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Helm">
<style>
  :root {
    --bg: #0a0a0f;
    --card: rgba(255,255,255,0.05);
    --line: rgba(255,255,255,0.10);
    --txt: #f4f4f8;
    --dim: #9a9aa8;
    --accent: #5eead4;
    --accent-soft: rgba(94,234,212,0.18);
    --err: #ff5d73;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100dvh; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
    overflow: hidden;
  }
  .glow {
    position: fixed; width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, var(--accent-soft), transparent 70%);
    filter: blur(40px); z-index: 0; pointer-events: none;
    top: 50%; left: 50%; transform: translate(-50%, -60%);
  }
  .login {
    position: relative; z-index: 1;
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .mark {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .wheel {
    width: 54px; height: 54px; color: var(--accent);
    animation: spin 22s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .wheel { animation: none; } }
  .title { font-size: 26px; font-weight: 600; letter-spacing: 0.5px; }
  .sub { font-size: 14px; color: var(--dim); margin-top: -4px; }
  .field {
    width: 100%; display: flex; flex-direction: column; gap: 8px;
  }
  input[type="password"] {
    width: 100%; padding: 15px 16px; font-size: 16px;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    color: var(--txt); outline: none; transition: border-color .2s, background .2s;
  }
  input[type="password"]:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }
  button {
    width: 100%; padding: 15px; font-size: 16px; font-weight: 600;
    font-family: inherit; color: #06120f; background: var(--accent);
    border: none; border-radius: 14px; cursor: pointer;
    transition: transform .12s, opacity .2s;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .5; cursor: default; }
  .err {
    font-size: 14px; color: var(--err); min-height: 18px; text-align: center;
    opacity: 0; transition: opacity .2s;
  }
  .err.show { opacity: 1; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="login">
  <div class="mark">
    <svg class="wheel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9"></circle>
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"></path>
    </svg>
    <div class="title">Helm</div>
    <div class="sub">пульт управления ПК</div>
  </div>
  <div class="field">
    <input type="password" id="pw" placeholder="Пароль" autocomplete="current-password" inputmode="text">
  </div>
  <button id="go">Войти</button>
  <div class="err" id="err"></div>
</div>
<script>
  const pw = document.getElementById('pw');
  const go = document.getElementById('go');
  const err = document.getElementById('err');

  function showErr(text){ err.textContent = text; err.classList.add('show'); }
  function clearErr(){ err.classList.remove('show'); }

  async function login(){
    const password = pw.value;
    if(!password){ showErr('Введите пароль'); return; }
    clearErr(); go.disabled = true; go.textContent = 'Проверка…';
    try {
      const resp = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      if(resp.ok){
        window.location.href = '/';      // сервер уже поставил cookie сессии
      } else {
        showErr('Неверный пароль');
        pw.value = ''; pw.focus();
      }
    } catch(e){
      showErr('Сервер недоступен');
    } finally {
      go.disabled = false; go.textContent = 'Войти';
    }
  }

  go.addEventListener('click', login);
  pw.addEventListener('keydown', (e) => { if(e.key === 'Enter') login(); });
  pw.focus();
</script>
</body>
</html>
