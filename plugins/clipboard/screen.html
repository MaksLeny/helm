<style>
  /* Заскоуплено под #plugin-clipboard, наследует тему Helm. */
  #plugin-clipboard { padding-bottom: 28px; }

  #plugin-clipboard .cb-compose {
    display: flex; flex-direction: column; gap: 10px; margin: 4px 0 14px;
  }
  #plugin-clipboard .cb-input {
    width: 100%; min-height: 92px; resize: vertical;
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    color: var(--txt); font-family: inherit; font-size: 15px; line-height: 1.5;
    padding: 14px 16px; outline: none;
    transition: border-color .2s, background .2s;
  }
  #plugin-clipboard .cb-input:focus { border-color: var(--accent); }
  #plugin-clipboard .cb-input::placeholder { color: var(--dim); }

  #plugin-clipboard .cb-actions { display: flex; gap: 10px; }
  #plugin-clipboard .cb-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 14px; border-radius: 14px; font-family: inherit; font-size: 14.5px;
    font-weight: 600; cursor: pointer; border: 1px solid var(--line);
    background: var(--card); color: var(--txt);
    transition: transform .12s, background .2s, opacity .2s;
  }
  #plugin-clipboard .cb-btn svg { width: 18px; height: 18px; }
  #plugin-clipboard .cb-btn:active { transform: scale(.96); }
  #plugin-clipboard .cb-btn.primary {
    background: var(--accent); color: #06120f; border-color: transparent;
  }
  #plugin-clipboard .cb-btn:disabled { opacity: .45; pointer-events: none; }
  #plugin-clipboard .cb-btn.icon-only { flex: 0 0 auto; width: 50px; }

  /* Переключатель авто-слежения */
  #plugin-clipboard .cb-watch {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 11px 14px; margin-bottom: 16px; font-size: 14px;
  }
  #plugin-clipboard .cb-watch .cb-watch-label { display: flex; flex-direction: column; gap: 2px; }
  #plugin-clipboard .cb-watch .cb-watch-sub { font-size: 11.5px; color: var(--dim); }
  #plugin-clipboard .cb-toggle {
    position: relative; width: 46px; height: 27px; flex-shrink: 0;
    border-radius: 14px; background: var(--line); cursor: pointer; transition: background .25s;
  }
  #plugin-clipboard .cb-toggle.on { background: var(--accent); }
  #plugin-clipboard .cb-toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px; width: 21px; height: 21px;
    border-radius: 50%; background: #fff; transition: transform .25s;
  }
  #plugin-clipboard .cb-toggle.on::after { transform: translateX(19px); }

  #plugin-clipboard .cb-section {
    display: flex; align-items: center; justify-content: space-between;
    margin: 6px 2px 10px;
  }
  #plugin-clipboard .cb-section .cb-title { font-size: 13px; color: var(--dim); }
  #plugin-clipboard .cb-clear {
    background: none; border: none; color: var(--dim); font-family: inherit;
    font-size: 13px; cursor: pointer; padding: 4px 6px; border-radius: 8px;
  }
  #plugin-clipboard .cb-clear:active { color: var(--txt); }

  #plugin-clipboard .cb-list { display: flex; flex-direction: column; gap: 10px; }

  #plugin-clipboard .cb-item {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 13px 14px; display: flex; flex-direction: column; gap: 10px;
    animation: cbIn .22s ease;
  }
  @keyframes cbIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  #plugin-clipboard .cb-item .cb-top { display: flex; align-items: flex-start; gap: 10px; }
  #plugin-clipboard .cb-badge {
    flex-shrink: 0; width: 30px; height: 30px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-soft); color: var(--accent);
  }
  #plugin-clipboard .cb-badge svg { width: 16px; height: 16px; }
  #plugin-clipboard .cb-text {
    flex: 1; min-width: 0; font-size: 14px; line-height: 1.45; word-break: break-word;
    max-height: 4.4em; overflow: hidden; position: relative;
  }
  #plugin-clipboard .cb-text.url { color: var(--accent); }
  #plugin-clipboard .cb-meta { font-size: 11.5px; color: var(--dim); margin-top: 3px; }

  /* Превью картинки */
  #plugin-clipboard .cb-thumb {
    width: 100%; max-height: 220px; object-fit: contain; border-radius: 12px;
    background: rgba(0,0,0,.15); display: block;
  }

  #plugin-clipboard .cb-row { display: flex; gap: 8px; flex-wrap: wrap; }
  #plugin-clipboard .cb-mini {
    display: flex; align-items: center; gap: 6px; padding: 7px 11px;
    border-radius: 10px; border: 1px solid var(--line); background: transparent;
    color: var(--txt); font-family: inherit; font-size: 12.5px; cursor: pointer;
    transition: transform .12s, background .2s; text-decoration: none;
  }
  #plugin-clipboard .cb-mini svg { width: 14px; height: 14px; }
  #plugin-clipboard .cb-mini:active { transform: scale(.94); background: var(--card-hi); }
  #plugin-clipboard .cb-mini.danger { color: var(--like, #ff5d73); border-color: transparent; }

  #plugin-clipboard .cb-empty {
    text-align: center; color: var(--dim); padding: 44px 16px; font-size: 14.5px;
    line-height: 1.6;
  }
  #plugin-clipboard .cb-warn {
    font-size: 12.5px; color: var(--like, #ff5d73); margin: 0 2px 14px; line-height: 1.5;
    display: none;
  }
  #plugin-clipboard .cb-warn.show { display: block; }

  #plugin-clipboard .cb-toast {
    position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
    background: var(--card-hi); color: var(--txt); border: 1px solid var(--line);
    padding: 11px 18px; border-radius: 14px; font-size: 14px; z-index: 75;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
    max-width: 80%; text-align: center;
  }
  #plugin-clipboard .cb-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<div class="cb-warn" id="cbWarn">
  Системный буфер ПК сейчас недоступен — отправка/чтение могут не работать.
</div>

<div class="cb-compose">
  <textarea class="cb-input" id="cbInput"
    placeholder="Текст или ссылка для отправки на ПК…"
    autocapitalize="sentences" autocomplete="off" spellcheck="false"></textarea>
  <div class="cb-actions">
    <button class="cb-btn primary" id="cbSend">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      На ПК
    </button>
    <button class="cb-btn icon-only" id="cbAttach" title="Прикрепить файл или картинку">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg>
    </button>
    <button class="cb-btn" id="cbPull">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
      С ПК
    </button>
  </div>
  <input type="file" id="cbFile" style="display:none;" multiple>
</div>

<div class="cb-watch">
  <div class="cb-watch-label">
    <span>Авто-слежение за буфером ПК</span>
    <span class="cb-watch-sub">Новый текст и картинки на ПК сами появятся здесь</span>
  </div>
  <div class="cb-toggle" id="cbWatchToggle"></div>
</div>

<div class="cb-section">
  <span class="cb-title">История</span>
  <button class="cb-clear" id="cbClear">Очистить</button>
</div>

<div class="cb-list" id="cbList"></div>
<div class="cb-empty" id="cbEmpty" style="display:none;">
  Пока пусто.<br>Отправь текст, файл или забери буфер с ПК.
</div>

<div class="cb-toast" id="cbToast"></div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const input = $('cbInput');
  const list = $('cbList');
  const BASE = '/plugin/clipboard';

  const IC = {
    copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
    open: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>',
    pc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
    del: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>',
    dl: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>',
    text: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>',
    img: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
    file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>'
  };

  function toast(text){
    const t = $('cbToast'); if(!t) return;
    t.textContent = text; t.classList.add('show');
    clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove('show'), 2400);
  }
  function send(obj){ if(window.HelmSend) window.HelmSend(Object.assign({ plugin: 'clipboard' }, obj)); }

  async function copyToPhone(text){
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text); return true;
      }
    }catch(_){}
    try{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta); return ok;
    }catch(_){ return false; }
  }

  function fmtSize(b){
    if(b == null) return '';
    if(b < 1024) return b + ' Б';
    if(b < 1024*1024) return (b/1024).toFixed(0) + ' КБ';
    return (b/1024/1024).toFixed(1) + ' МБ';
  }
  function timeAgo(ts){
    const s = Math.max(0, Math.floor(Date.now()/1000 - ts));
    if(s < 60) return 'только что';
    const m = Math.floor(s/60); if(m < 60) return m + ' мин назад';
    const h = Math.floor(m/60); if(h < 24) return h + ' ч назад';
    return Math.floor(h/24) + ' дн назад';
  }
  function makeMini(label, icon, cls, onClick){
    const b = document.createElement('button');
    b.className = 'cb-mini' + (cls ? ' ' + cls : '');
    b.innerHTML = icon + (label ? '<span>' + label + '</span>' : '');
    b.addEventListener('click', onClick);
    return b;
  }
  function makeLink(label, icon, href, download){
    const a = document.createElement('a');
    a.className = 'cb-mini'; a.href = href;
    if(download) a.setAttribute('download', download);
    a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = icon + '<span>' + label + '</span>';
    return a;
  }

  function render(items){
    list.innerHTML = '';
    if(!items || !items.length){ $('cbEmpty').style.display = 'block'; return; }
    $('cbEmpty').style.display = 'none';
    items.forEach(it => {
      const card = document.createElement('div');
      card.className = 'cb-item';
      const srcLabel = it.src === 'pc' ? 'с ПК' : 'с телефона';
      const blobUrl = it.blob_id ? (BASE + '/blob/' + it.blob_id) : null;

      if(it.kind === 'image' && blobUrl){
        // превью картинки
        const img = document.createElement('img');
        img.className = 'cb-thumb'; img.src = blobUrl; img.alt = it.filename || 'изображение';
        img.loading = 'lazy';
        // Если превью не загрузилось — показываем заметную плашку со ссылкой,
        // чтобы было видно: запись есть, проблема только в отображении.
        img.addEventListener('error', () => {
          const ph = document.createElement('div');
          ph.style.cssText = 'padding:16px;border:1px dashed var(--line);border-radius:12px;'
            + 'color:var(--dim);font-size:13px;text-align:center;';
          ph.textContent = 'Превью не загрузилось — нажмите «Скачать»';
          if(img.parentNode) img.parentNode.replaceChild(ph, img);
        });
        // Тап по картинке — открыть в полном размере.
        img.addEventListener('click', () => window.open(blobUrl, '_blank'));
        card.appendChild(img);
        const meta = document.createElement('div');
        meta.className = 'cb-meta';
        meta.textContent = (it.filename || 'Изображение') + ' · ' + fmtSize(it.size) + ' · ' + srcLabel + ' · ' + timeAgo(it.ts);
        card.appendChild(meta);
        const row = document.createElement('div'); row.className = 'cb-row';
        row.appendChild(makeLink('Скачать', IC.dl, blobUrl, it.filename || 'image.png'));
        row.appendChild(makeMini('В буфер ПК', IC.pc, '', () => { send({cmd:'copy_image', id: it.id}); toast('Картинка в буфер ПК'); }));
        row.appendChild(makeMini('', IC.del, 'danger', () => send({cmd:'delete', id: it.id})));
        card.appendChild(row);
      } else if(it.kind === 'file' && blobUrl){
        const top = document.createElement('div'); top.className = 'cb-top';
        const badge = document.createElement('span'); badge.className = 'cb-badge'; badge.innerHTML = IC.file;
        top.appendChild(badge);
        const info = document.createElement('div'); info.style.cssText = 'flex:1;min-width:0;';
        const nm = document.createElement('div'); nm.className = 'cb-text'; nm.textContent = it.filename || 'файл';
        const meta = document.createElement('div'); meta.className = 'cb-meta';
        meta.textContent = fmtSize(it.size) + ' · ' + srcLabel + ' · ' + timeAgo(it.ts);
        info.appendChild(nm); info.appendChild(meta); top.appendChild(info);
        card.appendChild(top);
        const row = document.createElement('div'); row.className = 'cb-row';
        row.appendChild(makeLink('Скачать', IC.dl, blobUrl, it.filename || 'file'));
        row.appendChild(makeMini('', IC.del, 'danger', () => send({cmd:'delete', id: it.id})));
        card.appendChild(row);
      } else {
        // текст / ссылка
        const isUrl = it.kind === 'url';
        const top = document.createElement('div'); top.className = 'cb-top';
        const badge = document.createElement('span'); badge.className = 'cb-badge';
        badge.innerHTML = isUrl ? IC.link : IC.text;
        top.appendChild(badge);
        const info = document.createElement('div'); info.style.cssText = 'flex:1;min-width:0;';
        const txt = document.createElement('div'); txt.className = 'cb-text' + (isUrl ? ' url' : '');
        txt.textContent = it.text;
        const meta = document.createElement('div'); meta.className = 'cb-meta';
        meta.textContent = srcLabel + ' · ' + timeAgo(it.ts);
        info.appendChild(txt); info.appendChild(meta); top.appendChild(info);
        card.appendChild(top);
        const row = document.createElement('div'); row.className = 'cb-row';
        row.appendChild(makeMini('Копировать', IC.copy, '', async () => {
          const ok = await copyToPhone(it.text);
          toast(ok ? 'Скопировано в телефон' : 'Не удалось скопировать');
        }));
        if(isUrl){
          row.appendChild(makeMini('Открыть на ПК', IC.open, '', () => { send({cmd:'open', id: it.id}); toast('Открываю на ПК…'); }));
        }
        row.appendChild(makeMini('В буфер ПК', IC.pc, '', () => { send({cmd:'copy', id: it.id}); toast('В буфер ПК'); }));
        row.appendChild(makeMini('', IC.del, 'danger', () => send({cmd:'delete', id: it.id})));
        card.appendChild(row);
      }
      list.appendChild(card);
    });
  }

  // --- загрузка файла на ПК ---
  async function uploadFiles(files){
    for(const f of files){
      const fd = new FormData();
      fd.append('file', f, f.name);
      try{
        const r = await fetch(BASE + '/upload', { method:'POST', body: fd });
        const j = await r.json().catch(() => ({}));
        if(!r.ok || !j.ok){ toast('Ошибка: ' + (j.error || r.status)); }
        else { toast(j.to_clipboard ? (f.name + ' → буфер ПК') : ('Отправлено: ' + f.name)); }
      }catch(e){ toast('Сбой загрузки'); }
    }
  }

  // --- кнопки ---
  $('cbSend').addEventListener('click', () => {
    const text = input.value;
    if(!text.trim()){ toast('Введите текст'); return; }
    send({ cmd: 'push', text: text }); toast('Отправлено на ПК'); input.value = '';
  });
  $('cbAttach').addEventListener('click', () => $('cbFile').click());
  $('cbFile').addEventListener('change', (e) => {
    const files = e.target.files;
    if(files && files.length) uploadFiles(files);
    e.target.value = '';
  });
  $('cbPull').addEventListener('click', () => { send({ cmd: 'pull' }); toast('Читаю буфер ПК…'); });
  $('cbClear').addEventListener('click', () => send({ cmd: 'clear' }));
  $('cbWatchToggle').addEventListener('click', () => {
    const on = !$('cbWatchToggle').classList.contains('on');
    send({ cmd: 'watch', on: on });
  });

  window.HelmPlugins = window.HelmPlugins || {};
  window.HelmPlugins['clipboard'] = {
    onMessage: async (msg) => {
      if(msg.type === 'clip_history'){
        render(msg.items);
        $('cbWarn').classList.toggle('show', msg.clipboard_ok === false);
        $('cbWatchToggle').classList.toggle('on', !!msg.watch);
        // Прячем скрепку, если на ПК нет python-multipart (загрузка отключена).
        const attach = $('cbAttach');
        if(attach) attach.style.display = (msg.uploads_ok === false) ? 'none' : '';
      } else if(msg.type === 'clip_pulled' && msg.ok){
        const ok = await copyToPhone(msg.text);
        toast(ok ? 'Буфер ПК скопирован в телефон' : 'Получено (скопируйте вручную)');
      } else if(msg.type === 'clip_pulled_blob' && msg.ok){
        toast('Картинка получена с ПК');
      } else if(msg.type === 'clip_result'){
        if(!msg.ok) toast('Не удалось: ' + (msg.message || msg.action));
        else if(msg.action === 'pull' && msg.message) toast(msg.message);
      }
    },
    onShow: () => { send({ cmd: 'sync' }); },
    onHide: () => {}
  };
})();
</script>
